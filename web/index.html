<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>diet-python pipeline inspector</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root {
  color-scheme: dark;
  --bg-0: #08111b;
  --bg-1: #101b28;
  --bg-2: #172537;
  --ink-0: #e8f0fb;
  --ink-1: #9db0c7;
  --ink-2: #6f8198;
  --accent: #4fd1bd;
  --accent-soft: rgba(79, 209, 189, 0.16);
  --card: rgba(13, 21, 32, 0.82);
  --card-strong: rgba(18, 28, 41, 0.94);
  --line: rgba(173, 201, 228, 0.12);
  --line-strong: rgba(173, 201, 228, 0.24);
  --jump: rgba(255, 138, 101, 0.95);
  --panel-min-width: 120ch;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: "Manrope", "Segoe UI", sans-serif;
  color: var(--ink-0);
  background:
    radial-gradient(circle at 12% 8%, rgba(31, 118, 110, 0.34) 0%, transparent 32%),
    radial-gradient(circle at 88% 92%, rgba(35, 78, 140, 0.32) 0%, transparent 34%),
    linear-gradient(160deg, var(--bg-0), var(--bg-1) 48%, var(--bg-2));
}

.app {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  gap: 14px;
  padding: 14px;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 16px;
  border-radius: 16px;
  background: var(--card);
  border: 1px solid var(--line-strong);
  backdrop-filter: blur(10px);
  box-shadow: 0 14px 40px rgba(0, 0, 0, 0.34);
}

.title {
  font-size: 1.02rem;
  font-weight: 800;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}

.subtitle {
  font-size: 0.82rem;
  color: var(--ink-1);
}

.status {
  font-size: 0.8rem;
  color: var(--ink-1);
  white-space: nowrap;
}

.status-group {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}

.nav-controls {
  display: flex;
  align-items: center;
  gap: 10px;
}

.nav-button {
  border: 1px solid var(--line-strong);
  background: rgba(18, 29, 44, 0.95);
  color: var(--ink-0);
  border-radius: 10px;
  width: 36px;
  height: 36px;
  font-family: "IBM Plex Mono", ui-monospace, monospace;
  font-size: 1rem;
  cursor: pointer;
}

.nav-button:disabled {
  opacity: 0.4;
  cursor: default;
}

.step-window {
  font-size: 0.75rem;
  color: var(--ink-1);
}

.workspace {
  display: grid;
  grid-template-columns: minmax(0, 33.3333%) minmax(0, 66.6667%);
  gap: 14px;
  min-height: 0;
  flex: 1;
}

.panel {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 16px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-width: 0;
  min-height: 280px;
  box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
}

.clif-panel {
  grid-column: 1 / -1;
  min-height: 360px;
}

.dominator-panel {
  grid-column: 1 / -1;
  min-height: 360px;
}

.graphviz-panel {
  grid-column: 1 / -1;
}

.panel-head {
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  background: linear-gradient(
    to right,
    rgba(29, 43, 61, 0.96),
    rgba(17, 27, 40, 0.82)
  );
}

.panel-title {
  font-weight: 700;
  font-size: 0.88rem;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}

.panel-head-meta {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 0;
}

.panel-substatus {
  font-size: 0.74rem;
  color: var(--ink-1);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

textarea,
pre,
code {
  font-family: "IBM Plex Mono", ui-monospace, monospace;
}

textarea {
  width: 100%;
  flex: 1;
  min-height: 0;
  border: none;
  outline: none;
  resize: none;
  padding: 14px;
  font-size: 0.83rem;
  line-height: 1.4;
  background: rgba(8, 14, 22, 0.34);
  color: var(--ink-0);
}

textarea::placeholder {
  color: var(--ink-2);
}

pre {
  margin: 0;
  padding: 12px 14px;
  overflow: auto;
  flex: 1;
  min-height: 0;
  font-size: 0.78rem;
  line-height: 1.44;
  color: var(--ink-0);
  background: rgba(8, 14, 22, 0.28);
  white-space: pre;
}

.panel-body {
  flex: 1;
  min-height: 0;
  display: flex;
}

.select-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.72rem;
  color: var(--ink-1);
  text-transform: uppercase;
  letter-spacing: 0.02em;
}

select {
  font-family: "IBM Plex Mono", ui-monospace, monospace;
  font-size: 0.75rem;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 4px 8px;
  background: rgba(18, 29, 44, 0.95);
  color: var(--ink-0);
}

.structure-root {
  position: relative;
  overflow: auto;
  min-width: 0;
  flex: 1;
  min-height: 0;
  padding: 12px;
}

.graphviz-root {
  padding: 12px;
  overflow: auto;
  min-width: 0;
  flex: 1;
  min-height: 0;
}

.graphviz-root svg {
  display: block;
  min-width: max-content;
}

.graphviz-root svg text,
.graphviz-root svg tspan {
  fill: var(--ink-0) !important;
}

.graphviz-root svg .node polygon,
.graphviz-root svg .node ellipse,
.graphviz-root svg .node path {
  fill: rgba(18, 29, 44, 0.96) !important;
  stroke: var(--line-strong) !important;
}

.graphviz-root svg .edge path,
.graphviz-root svg .edge polygon,
.graphviz-root svg .edge polyline {
  stroke: rgba(157, 176, 199, 0.82) !important;
  fill: rgba(157, 176, 199, 0.82) !important;
}

.tree-layer {
  position: relative;
  z-index: 2;
  min-width: max-content;
}

.link-layer {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  overflow: visible;
}

.node {
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 8px 10px;
  background: var(--card-strong);
  margin-bottom: 8px;
  min-width: 340px;
}

.node-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.node-label {
  font-family: "IBM Plex Mono", ui-monospace, monospace;
  font-size: 0.78rem;
  font-weight: 500;
  color: #8ad7ff;
}

.node-term {
  font-family: "IBM Plex Mono", ui-monospace, monospace;
  font-size: 0.72rem;
  color: #c7d6e8;
  background: rgba(39, 56, 76, 0.9);
  border-radius: 8px;
  padding: 3px 6px;
}

.node-ops {
  margin-top: 6px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: rgba(9, 16, 24, 0.78);
  padding: 6px;
  white-space: pre-wrap;
  font-size: 0.72rem;
  color: #d8e4f1;
}

.node-children {
  margin-left: 24px;
  padding-left: 12px;
  border-left: 2px solid rgba(79, 209, 189, 0.22);
}

.placeholder {
  font-size: 0.82rem;
  color: var(--ink-1);
  padding: 18px;
}

@media (max-width: 1200px) {
  .workspace {
    grid-template-columns: minmax(0, 1fr);
  }

  .node {
    min-width: 0;
  }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="title">diet-python transform pipeline inspector</div>
      <div class="subtitle">Input source stays pinned on the left. Use Left/Right arrow to shift the preview on the right.</div>
    </div>
    <div class="nav-controls">
      <button class="nav-button" id="prevPass" type="button" aria-label="Previous pass">←</button>
      <div class="status-group">
        <div class="status" id="status">ready</div>
        <div class="step-window" id="stepWindow"></div>
      </div>
      <button class="nav-button" id="nextPass" type="button" aria-label="Next pass">→</button>
    </div>
  </div>

  <div class="workspace">
    <section class="panel source-panel">
      <div class="panel-head">
        <div class="panel-title" id="leftTitle">input source</div>
        <div class="select-wrap">
          <label for="sourceSample">Sample</label>
          <select id="sourceSample"></select>
        </div>
      </div>
      <div class="panel-body" id="leftPane"></div>
    </section>

    <section class="panel preview-panel">
      <div class="panel-head">
        <div class="panel-title" id="rightTitle">ast-to-ast</div>
      </div>
      <div class="panel-body" id="rightPane"></div>
    </section>

    <section class="panel clif-panel">
      <div class="panel-head">
        <div class="panel-head-meta">
          <div class="panel-title">Actual Generated CLIF</div>
          <div class="panel-substatus" id="clifStatus">Select a lowered function to render the post-opt CLIF fed to Cranelift.</div>
        </div>
        <div class="select-wrap">
          <label for="clifFunction">Function</label>
          <select id="clifFunction"></select>
        </div>
      </div>
      <div class="panel-body">
        <pre id="clifPane">; Actual CLIF will appear here.</pre>
      </div>
    </section>
  </div>
</div>

<script>
const leftPaneEl = document.getElementById("leftPane");
const rightPaneEl = document.getElementById("rightPane");
const leftTitleEl = document.getElementById("leftTitle");
const rightTitleEl = document.getElementById("rightTitle");
const sourceSampleEl = document.getElementById("sourceSample");
const prevPassEl = document.getElementById("prevPass");
const nextPassEl = document.getElementById("nextPass");
const stepWindowEl = document.getElementById("stepWindow");
const statusEl = document.getElementById("status");
const clifFunctionEl = document.getElementById("clifFunction");
const clifStatusEl = document.getElementById("clifStatus");
const clifPaneEl = document.getElementById("clifPane");

const state = {
  source: "",
  steps: [],
  pairStart: 0,
  requestedRightStepKey: null,
  functions: [],
  selectedFunctionKey: null,
  clifRequestSerial: 0,
};

const CUSTOM_SAMPLE_KEY = "__custom__";

const SOURCE_SAMPLES = [
  {
    key: "classify",
    label: "classify",
    source: `def classify(n):
    if n < 0:
        return "neg"
    if n == 0:
        return "zero"
    return "pos"`,
  },
  {
    key: "class_def",
    label: "class definition",
    source: `class Counter:
    scale = 2

    def __init__(self, start):
        self.value = start
        self.name = "counter"

    def increment(self):
        self.value += 1
        return self.value

    def scaled(self):
        return self.value * self.scale`,
  },
  {
    key: "closure",
    label: "closure",
    source: `def incrementer():
    n = 1

    def inner():
        nonlocal n
        n += 1
        return n

    return inner`,
  },
  {
    key: "generator",
    label: "generator",
    source: `def seq(n):
    for i in range(n):
        yield i`,
  },
  {
    key: "async",
    label: "async functions",
    source: `async def foo():
    return 1

async def bar():
    return (await foo()) + 1`,
  },
  {
    key: "async_generator",
    label: "async generator",
    source: `async def aseq(n):
    for i in range(n):
        yield i

async def sum():
    n = 0
    async for i in aseq(5):
        n += i
    return n`,
  },
  {
    key: "with_stmt",
    label: "with statement",
    source: `from contextlib import nullcontext

def load_value():
    with nullcontext(1) as value:
        return value`,
  },
  {
    key: "async_with_stmt",
    label: "async with statement",
    source: `class AsyncLock:
    async def __aenter__(self):
        return 1

    async def __aexit__(self, exc_type, exc, tb):
        return False

async def use_lock():
    async with AsyncLock() as value:
        return value`,
  },
];

const DEFAULT_SAMPLE = SOURCE_SAMPLES[0];

function debounce(fn, delayMs) {
  let timer = null;
  return (...args) => {
    clearTimeout(timer);
    timer = setTimeout(() => fn(...args), delayMs);
  };
}

function setStatus(message, isError = false) {
  statusEl.textContent = message;
  statusEl.style.color = isError ? "#b42352" : "var(--ink-1)";
}

function currentRightStep() {
  return state.steps[state.pairStart + 1] || null;
}

function pairStartForRightStepKey(stepKey) {
  if (!stepKey) {
    return null;
  }
  const stepIndex = state.steps.findIndex((step, index) => index > 0 && step.key === stepKey);
  return stepIndex >= 0 ? Math.max(0, stepIndex - 1) : null;
}

function updateQueryParams() {
  const params = new URLSearchParams(window.location.search);
  if (state.source) {
    params.set("src", state.source);
  } else {
    params.delete("src");
  }
  const rightStep = currentRightStep();
  if (rightStep) {
    params.set("pass", rightStep.key);
  } else {
    params.delete("pass");
  }
  const query = params.toString();
  history.replaceState(null, "", query ? `?${query}` : window.location.pathname);
}

function isEditableTarget(target) {
  return target instanceof HTMLElement &&
    (target.tagName === "TEXTAREA" ||
      target.tagName === "INPUT" ||
      target.isContentEditable);
}

function maxPairStart() {
  return Math.max(0, state.steps.length - 2);
}

function clampPairStart(next) {
  return Math.max(0, Math.min(next, maxPairStart()));
}

function makeReadonlyStep(text) {
  const pre = document.createElement("pre");
  pre.textContent = text || "";
  return pre;
}

function makeSourceEditor() {
  const textarea = document.createElement("textarea");
  textarea.spellcheck = false;
  textarea.placeholder = "Paste Python code here";
  textarea.value = state.source;
  textarea.addEventListener("input", () => {
    state.source = textarea.value;
    syncSourceSampleSelection();
    debouncedInspect();
  });
  return textarea;
}

function sampleForKey(key) {
  return SOURCE_SAMPLES.find((sample) => sample.key === key) || null;
}

function sampleKeyForSource(source) {
  return SOURCE_SAMPLES.find((sample) => sample.source === source)?.key || CUSTOM_SAMPLE_KEY;
}

function renderSourceSampleSelector() {
  sourceSampleEl.innerHTML = "";
  for (const sample of SOURCE_SAMPLES) {
    const option = document.createElement("option");
    option.value = sample.key;
    option.textContent = sample.label;
    sourceSampleEl.appendChild(option);
  }
  const customOption = document.createElement("option");
  customOption.value = CUSTOM_SAMPLE_KEY;
  customOption.textContent = "custom";
  sourceSampleEl.appendChild(customOption);
  syncSourceSampleSelection();
}

function syncSourceSampleSelection() {
  sourceSampleEl.value = sampleKeyForSource(state.source);
}

function clifFunctionKey(fn) {
  return `${fn.functionId}:${fn.qualname}:${fn.entryLabel}`;
}

function selectedClifFunction() {
  return state.functions.find((fn) => clifFunctionKey(fn) === state.selectedFunctionKey) || null;
}

function defaultClifFunction(functions) {
  return functions.find((fn) => fn.qualname !== "_dp_module_init") || functions[0] || null;
}

function setClifStatus(message, isError = false) {
  clifStatusEl.textContent = message;
  clifStatusEl.style.color = isError ? "#ff8c69" : "var(--ink-1)";
}

function renderClifText(text) {
  clifPaneEl.textContent = text;
}

function normalizeFunctions(payload) {
  if (!Array.isArray(payload)) {
    return [];
  }
  return payload.filter((fn) =>
    fn &&
    Number.isInteger(fn.functionId) &&
    typeof fn.qualname === "string" &&
    typeof fn.displayName === "string" &&
    typeof fn.bindName === "string" &&
    typeof fn.kind === "string" &&
    typeof fn.entryLabel === "string"
  );
}

function renderClifSelector() {
  const previousValue = state.selectedFunctionKey;
  clifFunctionEl.innerHTML = "";
  if (!state.functions.length) {
    const option = document.createElement("option");
    option.value = "";
    option.textContent = "No lowered functions";
    clifFunctionEl.appendChild(option);
    clifFunctionEl.disabled = true;
    state.selectedFunctionKey = null;
    return;
  }

  for (const fn of state.functions) {
    const option = document.createElement("option");
    option.value = clifFunctionKey(fn);
    option.textContent = `${fn.qualname} [fn#${fn.functionId} | ${fn.kind}]`;
    clifFunctionEl.appendChild(option);
  }
  clifFunctionEl.disabled = false;

  const defaultFunction = defaultClifFunction(state.functions);
  const defaultKey = defaultFunction ? clifFunctionKey(defaultFunction) : "";
  state.selectedFunctionKey = state.functions.some((fn) => clifFunctionKey(fn) === previousValue)
    ? previousValue
    : defaultKey;
  clifFunctionEl.value = state.selectedFunctionKey;
}

function renderSourceEditor(container) {
  const existing = container.querySelector("textarea");
  if (existing) {
    if (existing.value !== state.source) {
      existing.value = state.source;
    }
    return;
  }
  container.innerHTML = "";
  container.appendChild(makeSourceEditor());
}

function renderStep(container, step) {
  if (!step) {
    container.innerHTML = "";
    const placeholder = document.createElement("div");
    placeholder.className = "placeholder";
    placeholder.textContent = "No later pass.";
    container.appendChild(placeholder);
    return;
  }
  if (step.key === "input_source") {
    renderSourceEditor(container);
    return;
  }
  container.innerHTML = "";
  container.appendChild(makeReadonlyStep(step.text));
}

function renderPassWindow() {
  const rightStep = currentRightStep();

  leftTitleEl.textContent = "input source";
  rightTitleEl.textContent = rightStep?.label || "no later pass";
  renderSourceEditor(leftPaneEl);
  syncSourceSampleSelection();
  renderStep(rightPaneEl, rightStep);

  prevPassEl.disabled = state.pairStart === 0;
  nextPassEl.disabled = state.pairStart >= maxPairStart();
  stepWindowEl.textContent = rightStep
    ? `${state.pairStart + 1}/${Math.max(1, state.steps.length - 1)}`
    : "0/0";
}

async function inspectPipeline(source) {
  const response = await fetch("/api/inspect_pipeline", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({ source }),
  });
  const payload = await response.json();
  if (!response.ok) {
    throw new Error(payload.error || "inspect pipeline request failed");
  }
  return payload;
}

async function renderActualClif() {
  const source = state.source;
  const selected = selectedClifFunction();
  if (!source.trim()) {
    setClifStatus("Select a lowered function to render the post-opt CLIF fed to Cranelift.");
    renderClifText("; Actual CLIF will appear here.");
    return;
  }
  if (!selected) {
    setClifStatus("No lowered BB functions are available for CLIF rendering.");
    renderClifText("; No lowered functions available.");
    return;
  }

  const requestSerial = ++state.clifRequestSerial;
  setClifStatus(`Loading actual CLIF for ${selected.qualname}…`);
  renderClifText("; loading actual CLIF...");
  try {
    const response = await fetch("/api/jit_clif", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        source,
        functionId: selected.functionId,
        qualname: selected.qualname,
        entryLabel: selected.entryLabel,
      }),
    });
    const payload = await response.json();
    if (requestSerial !== state.clifRequestSerial) {
      return;
    }
    if (!response.ok) {
      throw new Error(payload.error || "jit_clif request failed");
    }
    renderClifText(payload.clif || "; no CLIF returned");
    setClifStatus(
      payload.resolved_entry
        ? `Actual post-opt CLIF | ${payload.resolved_entry}`
        : `Actual post-opt CLIF | ${selected.qualname}`
    );
  } catch (error) {
    if (requestSerial !== state.clifRequestSerial) {
      return;
    }
    setClifStatus("Actual CLIF unavailable", true);
    renderClifText(
      `; Unable to load actual CLIF.\n` +
      `; This view requires the soac-inspector axum server and a function with a full JIT fast path.\n\n` +
      String(error)
    );
  }
}

function shiftPassWindow(delta) {
  const next = clampPairStart(state.pairStart + delta);
  if (next === state.pairStart) {
    return;
  }
  state.pairStart = next;
  state.requestedRightStepKey = currentRightStep()?.key || null;
  renderPassWindow();
  updateQueryParams();
}

async function inspectNow() {
  const source = state.source;
  if (!source.trim()) {
    state.steps = [
      {
        key: "input_source",
        label: "input source",
        text: "",
      },
    ];
    state.pairStart = 0;
    state.requestedRightStepKey = null;
    state.functions = [];
    state.selectedFunctionKey = null;
    renderPassWindow();
    renderClifSelector();
    await renderActualClif();
    updateQueryParams();
    setStatus("ready");
    return;
  }

  try {
    const payload = await inspectPipeline(source);
    state.steps = Array.isArray(payload.steps) ? payload.steps : [];
    state.functions = normalizeFunctions(payload.functions);
    const requestedPairStart = pairStartForRightStepKey(state.requestedRightStepKey);
    state.pairStart =
      requestedPairStart === null ? clampPairStart(state.pairStart) : requestedPairStart;
    state.requestedRightStepKey = currentRightStep()?.key || null;
    renderPassWindow();
    renderClifSelector();
    await renderActualClif();
    updateQueryParams();
    setStatus(`ok | ${Math.max(0, state.steps.length - 1)} tracked pass${state.steps.length === 2 ? "" : "es"}`);
  } catch (error) {
    state.steps = [
      {
        key: "input_source",
        label: "input source",
        text: source,
      },
      {
        key: "error",
        label: "transform error",
        text: String(error),
      },
    ];
    state.pairStart = 0;
    state.requestedRightStepKey = null;
    state.functions = [];
    state.selectedFunctionKey = null;
    renderPassWindow();
    renderClifSelector();
    await renderActualClif();
    updateQueryParams();
    setStatus("transform error", true);
  }
}

const debouncedInspect = debounce(() => {
  void inspectNow();
}, 150);

async function run() {
  const params = new URLSearchParams(window.location.search);
  state.source = params.get("src") || DEFAULT_SAMPLE.source;
  state.requestedRightStepKey = params.get("pass");
  renderSourceSampleSelector();

  prevPassEl.addEventListener("click", () => shiftPassWindow(-1));
  nextPassEl.addEventListener("click", () => shiftPassWindow(1));
  sourceSampleEl.addEventListener("change", () => {
    if (sourceSampleEl.value === CUSTOM_SAMPLE_KEY) {
      const textarea = leftPaneEl.querySelector("textarea");
      textarea?.focus();
      return;
    }
    const sample = sampleForKey(sourceSampleEl.value);
    if (!sample) {
      return;
    }
    state.source = sample.source;
    renderSourceEditor(leftPaneEl);
    void inspectNow();
  });
  clifFunctionEl.addEventListener("change", () => {
    state.selectedFunctionKey = clifFunctionEl.value || null;
    void renderActualClif();
  });
  window.addEventListener("keydown", (event) => {
    if (isEditableTarget(event.target)) {
      return;
    }
    if (event.key === "ArrowRight") {
      event.preventDefault();
      shiftPassWindow(1);
    } else if (event.key === "ArrowLeft") {
      event.preventDefault();
      shiftPassWindow(-1);
    }
  });

  await inspectNow();
}

run();
</script>
</body>
</html>
